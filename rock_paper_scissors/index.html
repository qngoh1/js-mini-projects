<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>ROCK PAPER SCISSORS</h1>

        <div class="scoreboard">
            <div class="score">
                <span class="score-label">YOU</span>
                <span class="score-value" id="human-score">0</span>
            </div>
            <div class="score">
                <span class="score-label">CPU</span>
                <span class="score-value" id="computer-score">0</span>
            </div>
        </div>

        <div class="round-info" id="round-info">ROUND 1 / 5</div>

        <div class="choices">
            <button class="choice-btn" data-choice="rock">ROCK</button>
            <button class="choice-btn" data-choice="paper">PAPER</button>
            <button class="choice-btn" data-choice="scissors">SCISSORS</button>
        </div>

        <div class="result" id="result">PICK YOUR WEAPON!</div>

        <div class="game-over hidden" id="game-over">
            <div class="final-result" id="final-result"></div>
            <button class="play-again-btn" id="play-again">PLAY AGAIN</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
