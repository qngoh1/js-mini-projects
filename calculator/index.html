<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="current-value" id="display">0</div>
        </div>
        <div class="buttons">
            <button class="btn-clear" id="btn-clear">C</button>
            <button class="btn-operator" data-op="backspace">&larr;</button>
            <button class="btn-operator" data-op="divide">&divide;</button>
            <button class="btn-operator" data-op="multiply">&times;</button>

            <button data-digit="7">7</button>
            <button data-digit="8">8</button>
            <button data-digit="9">9</button>
            <button class="btn-operator" data-op="subtract">&minus;</button>

            <button data-digit="4">4</button>
            <button data-digit="5">5</button>
            <button data-digit="6">6</button>
            <button class="btn-operator" data-op="add">+</button>

            <button data-digit="1">1</button>
            <button data-digit="2">2</button>
            <button data-digit="3">3</button>
            <button class="btn-equals" id="btn-equals">=</button>

            <button data-digit="0" style="grid-column: span 2;">0</button>
            <button data-digit=".">.</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
